<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
      {{ id ? '✏️ Editar Canción' : '🎵 Nueva Canción' }}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding fondo-form">

  <ion-card class="form-card">

    <ion-card-header>
      <ion-card-title>
        {{ id ? 'Actualizar canción' : 'Agregar canción' }}
      </ion-card-title>
      <ion-card-subtitle>
        Completa la información
      </ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-label position="stacked">🎵 Detalle *</ion-label>
        <ion-input [(ngModel)]="cancion.detalle"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">🖼️ URL Imagen</ion-label>
        <ion-input [(ngModel)]="cancion.imagen_url"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">🎥 URL Video</ion-label>
        <ion-input [(ngModel)]="cancion.video_url"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">🎧 URL Audio</ion-label>
        <ion-input [(ngModel)]="cancion.audio_url"></ion-input>
      </ion-item>

      <!-- Vista previa imagen -->
      <div *ngIf="cancion.imagen_url" class="preview-container">
        <img [src]="cancion.imagen_url" alt="Preview">
      </div>

      <!-- Preview de audio -->
      <div *ngIf="cancion.audio_url" class="audio-container">
        <audio controls [src]="cancion.audio_url"></audio>
      </div>

      <!-- Preview de video -->
      <div *ngIf="cancion.video_url" class="video-container">
        <a [href]="cancion.video_url" target="_blank" rel="noopener noreferrer">
          <ion-icon name="play-circle-outline"></ion-icon> Ver video
        </a>
      </div>

      <ion-button
        expand="block"
        color="success"
        class="guardar-btn"
        (click)="guardar()">

        {{ id ? 'Actualizar' : 'Guardar' }}
      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
